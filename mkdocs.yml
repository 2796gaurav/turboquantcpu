site_name: TurboQuantCPU
site_description: CPU-optimized KV cache quantization for LLM inference with mathematical guarantees
site_author: Gaurav Chauhan
site_url: https://2796gaurav.github.io/turboquantcpu/

repo_name: 2796gaurav/turboquantcpu
repo_url: https://github.com/2796gaurav/turboquantcpu
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024-2026 Gaurav Chauhan

theme:
  name: material
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
      primary: indigo
      accent: indigo
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
      primary: indigo
      accent: indigo
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
      primary: indigo
      accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - header.autohide
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    logo: octicons/zap-16

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/`]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          paths: [turboquantcpu]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
            docstring_options:
              ignore_init_summary: false
            filters:
              - "!^_"
  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/2796gaurav
      name: Gaurav Chauhan on GitHub
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/2796gaurav
      name: Gaurav Chauhan on Twitter
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: Thanks for your feedback!
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: Thanks for your feedback! Help us improve this page by opening an issue on GitHub.

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.mark
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
      toc_depth: 3

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quick Start: quickstart.md
    - HuggingFace Integration: huggingface.md
  - User Guide:
    - Algorithms: algorithms.md
    - Complete Parameter Reference: parameters.md
    - API Reference: api.md
    - Benchmarks: benchmarks.md
  - Advanced:
    - Contributing: contributing.md
    - Changelog: changelog.md
  - About:
    - License: license.md
