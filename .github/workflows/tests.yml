name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
        exclude:
          # Reduce matrix size
          - os: macos-latest
            python-version: '3.9'
          - os: windows-latest
            python-version: '3.9'

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest numpy scipy torch
    
    - name: Build C extensions
      run: python setup.py build_ext --inplace
    
    - name: Install package
      run: pip install -e .
    
    - name: Run tests
      run: pytest tests/ -v --tb=short
    
    - name: Run correctness checks
      run: python -c "from turboquantcpu import run_correctness_check; run_correctness_check(verbose=True)"

  benchmark:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pytest numpy scipy torch matplotlib
    
    - name: Build and install
      run: |
        python setup.py build_ext --inplace
        pip install -e .
    
    - name: Run benchmarks
      run: python benchmarks/run_all_benchmarks.py
