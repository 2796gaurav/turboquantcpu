name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build and Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install build dependencies (stable versions)
      run: |
        python -m pip install --upgrade pip
        pip install "setuptools<69" "wheel<0.42" build twine
    
    - name: Clean
      run: rm -rf dist build *.egg-info
    
    - name: Build source distribution only
      run: python -m build --sdist
    
    - name: Check package
      run: twine check dist/*
    
    - name: Inspect package metadata
      run: |
        echo "=== dist contents ==="
        ls -la dist/
        echo ""
        echo "=== Extracting and checking PKG-INFO ==="
        mkdir -p /tmp/pkg_check
        tar -xzf dist/*.tar.gz -C /tmp/pkg_check
        echo "=== Metadata Version ==="
        grep "Metadata-Version" /tmp/pkg_check/*/PKG-INFO
        echo ""
        echo "=== Name & Version ==="
        grep -E "^(Name|Version):" /tmp/pkg_check/*/PKG-INFO
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        skip-existing: true
        print-hash: true
        attestations: false
