name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build and Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
    
    - name: Clean
      run: rm -rf dist build *.egg-info
    
    - name: Build source distribution
      run: python -m build --sdist
    
    - name: Inspect package
      run: |
        echo "=== dist contents ==="
        ls -l dist
        echo ""
        echo "=== Extracting and checking PKG-INFO ==="
        tar -xzf dist/*.tar.gz -C /tmp
        find /tmp -name PKG-INFO -exec cat {} \;
        echo ""
        echo "=== Verifying version consistency ==="
        echo "Filename:"
        ls dist/*.tar.gz
        echo ""
        echo "Version from PKG-INFO:"
        grep "^Version:" /tmp/*/PKG-INFO || true
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        skip-existing: true
        print-hash: true
